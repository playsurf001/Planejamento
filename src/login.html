<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Controle de Produção</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="bg-blue-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-user-lock text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800">Sistema de Produção</h1>
      <p class="text-gray-600 mt-2">Faça login para continuar</p>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-user mr-2"></i>Usuário
        </label>
        <input 
          type="text" 
          id="username" 
          name="username"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Digite seu usuário"
          required
          autocomplete="username"
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-lock mr-2"></i>Senha
        </label>
        <div class="relative">
          <input 
            type="password" 
            id="password" 
            name="password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          >
          <button 
            type="button" 
            onclick="togglePassword()"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
          >
            <i id="toggleIcon" class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center">
        <input 
          type="checkbox" 
          id="remember" 
          class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
        >
        <label for="remember" class="ml-2 text-sm text-gray-600">
          Lembrar-me
        </label>
      </div>

      <button 
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition duration-200 flex items-center justify-center"
      >
        <i class="fas fa-sign-in-alt mr-2"></i>
        Entrar
      </button>

      <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg text-sm">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="errorText"></span>
      </div>

      <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg text-sm">
        <i class="fas fa-check-circle mr-2"></i>
        Login realizado com sucesso! Redirecionando...
      </div>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      <p>Usuários padrão:</p>
      <p class="mt-2 font-mono text-xs bg-gray-100 p-2 rounded">
        <strong>admin</strong> / senha: admin<br>
        <strong>designer</strong> / senha: design123
      </p>
    </div>
  </div>

  <script>
    // API URL
    const API_URL = window.location.origin;

    // Toggle mostrar/ocultar senha
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }

    // Verificar se já está logado
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('auth_token');
      if (token) {
        // Verificar se token é válido
        fetch(`${API_URL}/api/auth/verify`, {
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(data => {
          if (data.valid) {
            window.location.href = '/';
          }
        })
        .catch(() => {
          localStorage.removeItem('auth_token');
        });
      }
    });

    // Handler do formulário de login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const errorText = document.getElementById('errorText');
      
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');
      
      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, remember })
        });
        
        const data = await response.json();
        
        if (response.ok && data.token) {
          // Salvar token
          localStorage.setItem('auth_token', data.token);
          if (data.user) {
            localStorage.setItem('user_data', JSON.stringify(data.user));
          }
          
          // Mostrar sucesso
          successMessage.classList.remove('hidden');
          
          // Redirecionar
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
          
        } else {
          throw new Error(data.message || 'Erro ao fazer login');
        }
        
      } catch (error) {
        errorText.textContent = error.message || 'Usuário ou senha inválidos';
        errorMessage.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
